<style>
/* GRID OVERLAY */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* SCANNING LINE */
.scanline {
  position: fixed;
  width: 100%;
  height: 2px;
  background: rgba(0,255,255,0.4);
  animation: scan 6s linear infinite;
}

@keyframes scan {
  0% { top: 0; }
  100% { top: 100%; }
}

/* SIDE PANEL */
.side-panel {
  position: fixed;
  top: 120px;
  left: 20px;
  width: 220px;
}

/* STATUS DOT */
.status-dot {
  width: 8px;
  height: 8px;
  background: #22d3ee;
  border-radius: 50%;
  box-shadow: 0 0 10px #22d3ee;
  animation: pulse 2s infinite;
}
</style>

<div class="scanline"></div>

<!-- LEFT FLOATING PANEL -->
<div class="side-panel glass p-4 space-y-3">
  <div class="text-xs text-cyan-300">SYSTEM STATUS</div>

  <div class="flex justify-between text-xs">
    <span>Location</span>
    <div class="status-dot"></div>
  </div>

  <div class="flex justify-between text-xs">
    <span>Voice Engine</span>
    <div class="status-dot"></div>
  </div>

  <div class="flex justify-between text-xs">
    <span>Emergency DB</span>
    <div class="status-dot"></div>
  </div>
</div>

<!-- COMMAND SUGGESTIONS -->
<div class="fixed bottom-24 left-6 glass p-4 w-64">
  <div class="text-xs text-cyan-300 mb-2">TRY SAYING</div>
  <ul class="text-xs space-y-1 text-slate-300">
    <li>“Find hospitals near me”</li>
    <li>“Fire emergency”</li>
    <li>“Earthquake tips”</li>
    <li>“Show hotlines”</li>
  </ul>
</div>

<!-- SMART TIPS PANEL -->
<div class="fixed top-24 right-6 glass p-4 w-64">
  <div class="text-xs text-cyan-300 mb-2">LIVE GUIDANCE</div>
  <div id="tips" class="text-xs text-slate-300">
    Monitoring conditions...
  </div>
</div>

<script>
/* Dynamic tips */
const tipsEl = document.getElementById("tips");

const tips = [
  "Stay alert. Emergency lines are active.",
  "Keep your phone charged at all times.",
  "Know your nearest evacuation route.",
  "Prepare a go-bag for quick exits."
];

let tipIndex = 0;

setInterval(()=>{
  tipsEl.innerText = tips[tipIndex];
  tipIndex = (tipIndex + 1) % tips.length;
}, 4000);
</script>
