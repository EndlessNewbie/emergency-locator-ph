<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH Emergency Mission Control</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
<script async src="https://platform.twitter.com/widgets.js"></script>

<style>
body {
  background: radial-gradient(circle at top, #020617, #000);
  color: white;
}

/* GRID */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
  background-size:40px 40px;
}

/* GLASS */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(0,255,255,0.2);
  border-radius: 12px;
}

/* ALERT */
.alert {
  position: fixed;
  top:20px;
  right:20px;
  background:red;
  padding:10px;
  border-radius:6px;
}

/* ORB */
#orb {
  width:70px;
  height:70px;
  border-radius:50%;
  background:#22d3ee;
  box-shadow:0 0 20px #22d3ee;
}
</style>

</head>

<body>

<header class="text-center py-6 text-cyan-400 text-2xl font-bold">
PH Emergency Mission Control
</header>

<main class="grid md:grid-cols-3 gap-6 p-6 max-w-7xl mx-auto">

<!-- LEFT -->
<div class="space-y-6">

<div class="glass p-4">
<h2>Hotlines</h2>
<ul class="text-sm">
<li>911</li>
<li>143</li>
<li>117</li>
</ul>
</div>

<div class="glass p-4">

<h2 class="mb-2">Traffic Intelligence</h2>

<div id="trafficPanel" class="space-y-2">

<div id="trafficLabel" class="text-sm">Analyzing...</div>

<div class="grid grid-cols-2 text-sm">
<div>Speed: <span id="speed"></span></div>
<div>Congestion: <span id="congestion"></span></div>
<div>Distance: <span id="distance"></span></div>
<div>Jams: <span id="jams"></span></div>
</div>

</div>

<iframe id="mapFrame" class="w-full h-64 mt-3"
src="https://www.google.com/maps?q=traffic+manila&output=embed"></iframe>


  <div class="glass p-4">
  <h2 class="text-cyan-300 mb-2">Live Weather</h2>

  <div id="weather" class="text-sm space-y-1">
    Loading weather data...
  </div>
</div>
</div>

  

</div>

<!-- CENTER -->
<div class="space-y-6">

<div class="glass p-4">
<h2>MMDA</h2>
<a class="twitter-timeline" data-height="250" href="https://twitter.com/MMDA"></a>
</div>

<div class="glass p-4">
<h2>NDRRMC</h2>
<a class="twitter-timeline" data-height="250" href="https://twitter.com/NDRRMC_OpCen"></a>
</div>

</div>

<!-- RIGHT -->
<div class="space-y-6">

<div class="glass p-4">
<h2>Weather</h2>
<iframe width="100%" height="250"
src="https://embed.windy.com/embed2.html?lat=14.6&lon=121&zoom=6&overlay=rain">
</iframe>
</div>

<div class="glass p-4">
<h2>Tips</h2>
<div id="tips"></div>
</div>

</div>

</main>

<!-- JARVIS -->
<div class="fixed bottom-24 right-6 glass p-4 w-72">
<div>JARVIS</div>
<div id="output">System ready.</div>
</div>

<div class="fixed bottom-6 right-6">
<div id="orb" onclick="startListening()"></div>
</div>

<script src="app.js"></script>

</body>
</html>
