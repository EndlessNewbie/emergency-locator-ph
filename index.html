<!DOCTYPE html>
<html lang="en" class="transition duration-300">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH Emergency Finder - Mission Control</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
<script async src="https://platform.twitter.com/widgets.js"></script>

<style>
body {
  background: radial-gradient(circle at top, #020617, #000);
  color: white;
  font-family: 'Inter', sans-serif;
}

/* GRID */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* SCANLINE */
.scanline {
  position: fixed;
  width: 100%;
  height: 2px;
  background: rgba(0,255,255,0.3);
  animation: scan 6s linear infinite;
}
@keyframes scan {
  0% { top: 0; }
  100% { top: 100%; }
}

/* GLASS */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(0,255,255,0.2);
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,255,255,0.1);
}

/* ALERT */
.alert {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(255,0,0,0.2);
  border: 1px solid red;
  padding: 10px 15px;
  border-radius: 8px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px);}
  to { opacity: 1;}
}

/* ORB */
#orb {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: radial-gradient(circle, #22d3ee, #0ea5e9);
  box-shadow: 0 0 25px #22d3ee;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  50% { transform: scale(1.1); }
}

/* WAVE */
.wave span {
  display:inline-block;
  width:3px;
  height:10px;
  background:#22d3ee;
  margin:1px;
  animation: wave 1s infinite;
}
@keyframes wave {
  50% { height:20px;}
}
</style>
</head>

<body>

<div class="scanline"></div>

<header class="text-center py-6 text-cyan-400 text-2xl font-bold">
PH Emergency Mission Control
</header>

<main class="grid md:grid-cols-3 gap-6 p-6 max-w-7xl mx-auto">

<!-- LEFT -->
<div class="space-y-6">

<div class="glass p-4">
<h2 class="text-cyan-300 mb-2">Hotlines</h2>
<ul class="text-sm space-y-1">
<li>911 - Emergency</li>
<li>143 - Red Cross</li>
<li>117 - NDRRMC</li>
</ul>
</div>

<div class="glass p-4">
<h2 class="text-cyan-300 mb-2">Map Search</h2>

<div class="flex gap-2 mb-2">
<button onclick="searchMap('hospital')" class="bg-cyan-600 px-2 py-1 text-xs rounded">Hospital</button>
<button onclick="searchMap('police')" class="bg-cyan-600 px-2 py-1 text-xs rounded">Police</button>
<button onclick="searchMap('fire station')" class="bg-cyan-600 px-2 py-1 text-xs rounded">Fire</button>
</div>

<iframe id="mapFrame" class="w-full h-64 rounded"
src="https://www.google.com/maps?q=hospitals+near+manila&output=embed"></iframe>
</div>

</div>

<!-- CENTER -->
<div class="space-y-6">

<div class="glass p-4">
<h2 class="text-cyan-300 mb-2">MMDA Traffic</h2>
<a class="twitter-timeline"
   data-theme="dark"
   data-height="300"
   href="https://twitter.com/MMDA">
</a>
</div>

<div class="glass p-4">
<h2 class="text-cyan-300 mb-2">NDRRMC Alerts</h2>
<a class="twitter-timeline"
   data-theme="dark"
   data-height="300"
   href="https://twitter.com/NDRRMC_OpCen">
</a>
</div>

</div>

<!-- RIGHT -->
<div class="space-y-6">

<div class="glass p-4">
<h2 class="text-cyan-300 mb-2">Weather</h2>
<iframe width="100%" height="250"
src="https://embed.windy.com/embed2.html?lat=14.6&lon=121&zoom=6&level=surface&overlay=wind"
frameborder="0"></iframe>
</div>

<div class="glass p-4">
<h2 class="text-cyan-300 mb-2">Live Tips</h2>
<div id="tips" class="text-sm"></div>
</div>

</div>

</main>

<!-- COMMAND SUGGESTIONS -->
<div class="fixed bottom-24 left-6 glass p-3 text-xs">
Try: "find hospital", "fire", "earthquake"
</div>

<!-- JARVIS -->
<div class="fixed bottom-24 right-6 glass p-4 w-72">
<div class="text-xs text-cyan-300">JARVIS</div>
<div id="output" class="text-sm">System ready.</div>
<div id="wave" class="hidden mt-2">
<span></span><span></span><span></span>
</div>
</div>

<div class="fixed bottom-6 right-6 flex flex-col items-center">
<div id="orb" onclick="startListening()"></div>
<span class="text-xs text-gray-400">Speak</span>
</div>

<script>

/* MAP */
function searchMap(type){
navigator.geolocation.getCurrentPosition(pos=>{
const {latitude, longitude} = pos.coords;
document.getElementById("mapFrame").src =
`https://www.google.com/maps?q=${type}+near+${latitude},${longitude}&output=embed`;
});
}

/* TIPS */
const tips = [
"Stay alert. Emergency lines active.",
"Prepare go-bag.",
"Monitor weather updates.",
"Know evacuation routes."
];
let i=0;
setInterval(()=>{
document.getElementById("tips").innerText = tips[i];
i=(i+1)%tips.length;
},3000);

/* VOICE */
function startListening(){
const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
rec.start();
rec.onresult = e=>{
const cmd = e.results[0][0].transcript.toLowerCase();
handle(cmd);
};
}

/* COMMANDS */
function handle(cmd){
let res="Unknown command";

if(cmd.includes("hospital")){
res="Locating hospitals";
searchMap("hospital");
triggerAlert("Hospital search triggered");
}

else if(cmd.includes("fire")){
res="Fire emergency protocol";
triggerAlert("FIRE ALERT");
}

else if(cmd.includes("earthquake")){
res="Drop, cover, hold";
triggerAlert("EARTHQUAKE ALERT");
}

document.getElementById("output").innerText=res;
}

/* ALERT SYSTEM */
function triggerAlert(msg){
const div=document.createElement("div");
div.className="alert";
div.innerText=msg;
document.body.appendChild(div);
setTimeout(()=>div.remove(),4000);
}

</script>

</body>
</html>
